<!DOCTYPE html>
<html>
<head>
<title>Students List</title>
</head>

<body>

<h2>All Students</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Class</th>
<th>Email</th>
<th>Action</th>
</tr>

{% for student in students %}

<tr>

<td>{{student.id}}</td>
<td>{{student.name}}</td>
<td>{{student.class_name}}</td>
<td>{{student.email}}</td>

<td>
<a href="/delete/{{student.id}}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Back</a>

</body>
</html>
